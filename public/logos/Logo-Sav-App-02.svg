<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Fond -->
  <rect width="300" height="300" rx="12" fill="#f5f0eb"/>

  <!-- Pain de savon -->
  <rect x="55" y="170" width="190" height="95" rx="22" fill="#c0a882"/>
  <rect x="55" y="170" width="190" height="36" rx="22" fill="#d4b896"/>
  <!-- Reflet -->
  <rect x="75" y="175" width="80" height="8" rx="4" fill="white" opacity="0.25"/>
  <!-- Gravure sur le savon -->
  <text x="150" y="228" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2d3a2e" opacity="0.3">SavApp</text>
  <!-- Ligne décorative savon -->
  <line x1="75" y1="215" x2="225" y2="215" stroke="#2d3a2e" stroke-width="1" opacity="0.15"/>

  <!-- Bulles -->
  <circle cx="95"  cy="135" r="32" fill="none" stroke="#5a8a5a" stroke-width="2.5" opacity="0.75"/>
  <circle cx="101" cy="122" r="6"  fill="white" opacity="0.35"/>
  <circle cx="88"  cy="130" r="3"  fill="white" opacity="0.25"/>

  <circle cx="175" cy="90"  r="22" fill="none" stroke="#7c5cbf" stroke-width="2" opacity="0.65"/>
  <circle cx="180" cy="82"  r="4"  fill="white" opacity="0.35"/>

  <circle cx="215" cy="130" r="17" fill="none" stroke="#5a8a5a" stroke-width="2" opacity="0.55"/>
  <circle cx="219" cy="123" r="3"  fill="white" opacity="0.3"/>

  <circle cx="145" cy="65"  r="11" fill="none" stroke="#7c5cbf" stroke-width="1.5" opacity="0.5"/>
  <circle cx="148" cy="60"  r="2"  fill="white" opacity="0.3"/>

  <circle cx="75"  cy="75"  r="9"  fill="none" stroke="#c0a882" stroke-width="1.5" opacity="0.55"/>
  <circle cx="235" cy="75"  r="7"  fill="none" stroke="#5a8a5a" stroke-width="1.5" opacity="0.45"/>

  <!-- Gouttes d'eau -->
  <ellipse cx="150" cy="152" rx="5" ry="8" fill="#5a8a5a" opacity="0.25"/>
  <ellipse cx="128" cy="158" rx="4" ry="6" fill="#7c5cbf" opacity="0.22"/>
  <ellipse cx="172" cy="155" rx="4" ry="6" fill="#5a8a5a" opacity="0.22"/>
</svg>
