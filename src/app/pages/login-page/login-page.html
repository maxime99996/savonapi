<div class="login-page d-flex justify-content-center align-items-start pt-5">
  <div class="card login-card shadow-lg">

    <div class="card-header">
      <h4 class="mb-0">
        <i class="bi bi-person-lock me-2"></i>Connexion
      </h4>
    </div>

    <div class="card-body p-4">
      <form>
        <!-- Email -->
        <div class="mb-3">
          <label for="email" class="form-label fw-semibold">Adresse email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="exemple&#64;mail.fr"
              autocomplete="email"
            />
          </div>
        </div>

        <!-- Mot de passe -->
        <div class="mb-3">
          <label for="password" class="form-label fw-semibold">Mot de passe</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="••••••••"
              autocomplete="current-password"
            />
          </div>
        </div>

        <!-- Se souvenir / mot de passe oublié -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe" />
            <label class="form-check-label" for="rememberMe">Se souvenir de moi</label>
          </div>
          <a href="#" class="forgot-link">Mot de passe oublié ?</a>
        </div>

        <!-- Bouton connexion -->
        <button type="submit" class="btn btn-login w-100">
          <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
        </button>
      </form>
    </div>

    <div class="card-footer text-center py-3">
      <small>
        Pas encore de compte ?
        <a routerLink="/subscribe" class="register-link fw-semibold">Créer un compte</a>
      </small>
    </div>

  </div>
</div>
